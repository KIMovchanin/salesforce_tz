<template>
  <c-modal-shell heading={heading} size="medium" onclose={handleClose}>
    <div class="details">
      <div class="media">
        <c-item-image
          image-url={item.Image__c}
          alternative-text={heading}
          photographer-name={item.Unsplash_Photographer__c}
          photographer-url={item.Unsplash_Profile_URL__c}
        ></c-item-image>
      </div>
      <div class="information">
        <dl class="facts">
          <div>
            <dt>Type</dt>
            <dd>{item.Type__c}</dd>
          </div>
          <div>
            <dt>Family</dt>
            <dd>{item.Family__c}</dd>
          </div>
          <div>
            <dt>Price</dt>
            <dd>
              <lightning-formatted-number
                value={item.Price__c}
                format-style="currency"
                currency-code="USD"
              ></lightning-formatted-number>
            </dd>
          </div>
        </dl>
        <p class={stockClass}>{stockLabel}</p>
        <h3 class="slds-text-title_bold">Description</h3>
        <p class="description">{description}</p>
      </div>
    </div>
    <lightning-button
      slot="footer"
      label="Close"
      variant="neutral"
      onclick={handleClose}
    ></lightning-button>
    <lightning-button
      slot="footer"
      label="Add to cart"
      variant="brand"
      disabled={isOutOfStock}
      onclick={handleAdd}
    ></lightning-button>
  </c-modal-shell>
</template>
