<template>
  <article class="tile slds-card">
    <div class="media">
      <c-item-image
        image-url={imageUrl}
        alternative-text={itemName}
        loading="lazy"
        photographer-name={item.Unsplash_Photographer__c}
        photographer-url={item.Unsplash_Profile_URL__c}
      ></c-item-image>
    </div>
    <div class="content">
      <div class="heading-row">
        <h3 class="slds-text-heading_small slds-truncate" title={itemName}>
          {itemName}
        </h3>
        <lightning-formatted-number
          class="price"
          value={item.Price__c}
          format-style="currency"
          currency-code="USD"
        ></lightning-formatted-number>
      </div>
      <p class="metadata">{item.Type__c} / {item.Family__c}</p>
      <p class="description" title={description}>{description}</p>
      <p class={stockClass}>{stockLabel}</p>
      <div class="actions">
        <lightning-button
          label="Details"
          variant="neutral"
          onclick={handleDetails}
        ></lightning-button>
        <lightning-button
          label="Add"
          variant="brand"
          disabled={isOutOfStock}
          onclick={handleAdd}
        ></lightning-button>
      </div>
    </div>
  </article>
</template>
