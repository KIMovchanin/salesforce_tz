<template>
  <article class="tile slds-card">
    <div class="media">
      <template lwc:if={hasImage}>
        <img src={imageUrl} alt={itemName} loading="lazy" />
      </template>
      <template lwc:else>
        <div class="placeholder">
          <lightning-icon
            icon-name="standard:product_item"
            size="large"
            alternative-text="Image unavailable"
          ></lightning-icon>
        </div>
      </template>
    </div>
    <div class="content">
      <div class="heading-row">
        <h3 class="slds-text-heading_small slds-truncate" title={itemName}>
          {itemName}
        </h3>
        <lightning-formatted-number
          class="price"
          value={item.Price__c}
          format-style="currency"
          currency-code="USD"
        ></lightning-formatted-number>
      </div>
      <p class="metadata">{item.Type__c} / {item.Family__c}</p>
      <p class="description" title={description}>{description}</p>
      <p class={stockClass}>{stockLabel}</p>
      <div class="actions">
        <lightning-button
          label="Details"
          variant="neutral"
          onclick={handleDetails}
        ></lightning-button>
        <lightning-button
          label="Add"
          variant="brand"
          disabled={isOutOfStock}
          onclick={handleAdd}
        ></lightning-button>
      </div>
    </div>
  </article>
</template>
