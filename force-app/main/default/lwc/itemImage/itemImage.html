<template>
  <template lwc:if={hasImage}>
    <div class="image-frame">
      <img src={imageUrl} alt={alternativeText} loading={loading} />
    </div>
    <template lwc:if={isUnsplashImage}>
      <p class="attribution">
        Photo by
        <a href={photographerLink} target="_blank" rel="noopener noreferrer"
          >{photographerName}</a
        >
        on
        <a href={unsplashUrl} target="_blank" rel="noopener noreferrer"
          >Unsplash</a
        >
      </p>
    </template>
  </template>
  <template lwc:else>
    <div class="placeholder">
      <lightning-icon
        icon-name="standard:product_item"
        size="large"
        alternative-text="Image unavailable"
      ></lightning-icon>
    </div>
  </template>
</template>
